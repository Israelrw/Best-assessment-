<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Result — Best Assessment</title>
  <link rel="stylesheet" href="style.css"/>
  <script>MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']] } };</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="site-header">
    <div class="logo">
      <div class="logo-mark">BA</div>
      <span class="logo-text">Best Assessment</span>
    </div>
    <nav class="site-nav">
      <button class="nav-item" onclick="window.location.href='index.html'">← Take Another Test</button>
    </nav>
  </header>

  <main class="result-page-main" id="resultMain">
    <div class="empty-state" id="loadingState">
      <div class="empty-icon">⏳</div>
      <h3>Loading results...</h3>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    // Try sessionStorage first, then URL-encoded fallback (cross-device)
    let result = IA.sg('lastResult');
    if (!result) {
      try {
        const rParam = new URLSearchParams(location.search).get('r');
        if (rParam) result = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(rParam)))));
      } catch(_) {}
    }
    if (!result) { window.location.href = 'index.html'; }

    const main = document.getElementById('resultMain');
    const passClass = result.passed ? 'pass' : 'fail';
    const passLabel = result.passed ? 'PASSED ✓' : 'FAILED ✗';
    const emoji = result.passed ? '🏆' : '📚';

    const timeTakenMin = Math.floor(result.timeTaken / 60);
    const timeTakenSec = result.timeTaken % 60;

    let reviewHTML = '';
    if (result.showAnswers) {
      reviewHTML = `
        <div class="review-section">
          <div class="review-title">Question Review</div>
          ${result.details.map((d, i) => `
            <div class="review-item ${d.correct ? 'correct' : 'incorrect'}">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <span class="q-num-badge">Q${i+1}</span>
                <span class="review-mark" style="font-size:14px;font-weight:800;margin-left:auto">${d.correct ? '✓ +'+d.points : '✗ 0'}</span>
              </div>
              <div class="review-q-text">${d.question}</div>
              <div style="display:flex;flex-direction:column;gap:4px;margin-top:8px">
                <div class="review-ans">Your answer: <strong>${d.userAns}</strong></div>
                ${!d.correct ? `<div class="review-ans correct-ans">Correct: <strong>${d.correctDisplay}</strong></div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } else {
      reviewHTML = `
        <div style="padding:24px;text-align:center;color:var(--text2);font-size:13px;border-top:1px solid var(--border)">
          Question review is not available for this assessment.
        </div>
      `;
    }

    let cheatNote = '';
    if (result.cheatingFlags > 0) {
      cheatNote = `<div style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--yellow)">⚠ ${result.cheatingFlags} integrity violation(s) were recorded during this exam.</div>`;
    }

    main.innerHTML = `
      ${cheatNote}
      <div class="result-card">
        <div class="result-top ${passClass}">
          <div class="result-circle">
            <div class="result-percent">${result.percent}%</div>
            <div class="result-label">${passLabel}</div>
          </div>
          <div class="result-meta">
            <div style="font-size:28px;margin-bottom:8px">${emoji}</div>
            <h2>${result.testTitle}</h2>
            <div style="font-size:13px;color:var(--text2);margin-bottom:16px;font-family:var(--mono)">${result.student.name} · ${result.student.id}</div>
            <div class="result-stats">
              <div>
                <div class="rs-val">${result.scored} / ${result.total}</div>
                <div class="rs-lbl">Points</div>
              </div>
              <div>
                <div class="rs-val">${result.details.filter(d=>d.correct).length}</div>
                <div class="rs-lbl">Correct</div>
              </div>
              <div>
                <div class="rs-val">${result.details.filter(d=>!d.correct).length}</div>
                <div class="rs-lbl">Incorrect</div>
              </div>
              <div>
                <div class="rs-val">${timeTakenMin}m ${timeTakenSec}s</div>
                <div class="rs-lbl">Time Taken</div>
              </div>
            </div>
            <div style="font-size:12px;color:var(--text3);font-family:var(--mono)">${IA.fmtDate(result.date)}</div>
          </div>
        </div>
        ${reviewHTML}
      </div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="window.print()">🖨 Print Result</button>
        <button class="btn btn-primary" onclick="window.location.href='index.html'">Take Another Test</button>
      </div>
    `;

    if (window.MathJax) MathJax.typesetPromise([main]);

    // Confetti for pass
    if (result.passed) {
      const colors = ['#4f8ef7','#a855f7','#22c55e','#f59e0b','#ec4899'];
      for (let i = 0; i < 60; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.style.cssText = `
            position:fixed; top:-10px; left:${Math.random()*100}%;
            width:8px; height:8px; border-radius:${Math.random()>0.5?'50%':'2px'};
            background:${colors[Math.floor(Math.random()*colors.length)]};
            z-index:9999; pointer-events:none;
            animation: confettiFall ${1.5+Math.random()*2}s linear forwards;
          `;
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }, i * 40);
      }
      const style = document.createElement('style');
      style.textContent = `@keyframes confettiFall { to { transform: translateY(100vh) rotate(${Math.random()*720}deg); opacity: 0; } }`;
      document.head.appendChild(style);
    }
  </script>

  <style>
    @media print {
      .site-header, nav, button { display: none !important; }
      body { background: white; color: #000; }
      .bg-grid, .bg-glow { display: none; }
      .result-card { border: 1px solid #ddd; }
    }
  </style>
</body>
</html>
